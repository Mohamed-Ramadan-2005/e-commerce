openapi: 3.0.1
info:
  title: E-Commerce Platform API
  description: REST API documentation for the E-Commerce platform.
  version: "1.0"
servers:
  - url: http://localhost:8080
    description: Local development server
paths:
  /users/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequestDto'
      responses:
        '201':
          description: User created successfully
  /users/login:
    post:
      tags:
        - Authentication
      summary: Authenticate user and receive JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestDto'
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwtResponseDto'
  /users/{id}/promote:
    patch:
      tags:
        - Authentication
      summary: Promote user to ADMIN role
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User promoted successfully

  # --- NEW CATEGORIES ENDPOINTS ---
  /categories:
    get:
      tags:
        - Categories
      summary: Get all product categories
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryResponseDto'
    post:
      tags:
        - Categories
      summary: Create a new category (ADMIN only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequestDto'
      responses:
        '201':
          description: Category created

  /categories/{id}:
    get:
      tags:
        - Categories
      summary: Get a specific category by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Category details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponseDto'
    put:
      tags:
        - Categories
      summary: Update a category (ADMIN only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequestDto'
      responses:
        '200':
          description: Category updated
    delete:
      tags:
        - Categories
      summary: Delete a category (ADMIN only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Category deleted
  # --------------------------------

  /products:
    get:
      tags:
        - Products
      summary: Get all products
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductResponseDto'
    post:
      tags:
        - Products
      summary: Create a new product (ADMIN only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequestDto'
      responses:
        '201':
          description: Product created
  /products/{id}:
    put:
      tags:
        - Products
      summary: Update a product (ADMIN only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequestDto'
      responses:
        '200':
          description: Product updated
    delete:
      tags:
        - Products
      summary: Delete a product (ADMIN only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Product deleted
  /orders:
    post:
      tags:
        - Orders
      summary: Place a new order (USER only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequestDto'
      responses:
        '201':
          description: Order created
    get:
      tags:
        - Orders
      summary: Get all orders (ADMIN only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of all orders
  /orders/my-orders:
    get:
      tags:
        - Orders
      summary: View personal order history (USER only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of personal orders
  /orders/{id}/status:
    patch:
      tags:
        - Orders
      summary: Update order status (ADMIN only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderStatusUpdateRequestDto'
      responses:
        '200':
          description: Order status updated
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    # --- NEW CATEGORY SCHEMAS ---
    CategoryRequestDto:
      type: object
      properties:
        name:
          type: string
          example: "Electronics"
    CategoryResponseDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
    # ----------------------------
    UserRequestDto:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
    LoginRequestDto:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
    JwtResponseDto:
      type: object
      properties:
        token:
          type: string
    ProductRequestDto:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
        stockQuantity:
          type: integer
          format: int32
        categoryId:      # <-- Added Category Link
          type: integer
          format: int64
    ProductResponseDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
        stockQuantity:
          type: integer
          format: int32
        categoryName:    # <-- Added Category Name display
          type: string
    OrderItemDto:
      type: object
      properties:
        productId:
          type: integer
          format: int64
        quantity:
          type: integer
          format: int32
    OrderRequestDto:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemDto'
    OrderStatusUpdateRequestDto:
      type: object
      properties:
        status:
          type: string
          example: "SHIPPED"